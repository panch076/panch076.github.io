<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Krishay Panchal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <h1 class="decode-heading" id="heading">Krishay's Site</h1>

    <p>This site is under development currently.</p>
    <p class="link-text" ><a href="projects.html">Click here to see my projects</a> </p>

















<script>
(function () {
  const el = document.getElementById("heading");
  const finalText = el.textContent;
  const pool = "abcdefghijklmnopqrstuvwxyz";
  const cyclesPerChar = 6;
  const frameDelay = 90;
  const lockStagger = 2;
 
  if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
 
  el.textContent = "";
  const spans = [...finalText].map(ch => {
    const s = document.createElement("span");
    s.dataset.char = ch;
    s.className = ch === " " ? "" : "cycling";
    s.textContent = ch === " " ? " " : randomChar();
    el.appendChild(s);
    return s;
  });
 
  function randomChar() {
    return pool[Math.floor(Math.random() * pool.length)];
  }
 
  let frame = 0;
  const timer = setInterval(() => {
    let stillCycling = false;
 
    spans.forEach((s, i) => {
      const target = s.dataset.char;
      if (target === " ") return;
 
      const lockFrame = cyclesPerChar + i * lockStagger;
 
      if (frame >= lockFrame) {
        s.textContent = target;
        s.classList.remove("cycling");  
      } else {
        s.textContent = randomChar();
        stillCycling = true;
      }
    });
 
    frame++;
    if (!stillCycling) clearInterval(timer);
  }, frameDelay);
})();
</script>
</body>
</html>
